name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Typola ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="${{ github.repository }}"

          # Download all signature files from draft release
          mkdir -p sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir sigs

          TYPOLA_SIGNATURE_DIR=sigs \
          TYPOLA_UPDATE_VERSION="$VERSION" \
          TYPOLA_UPDATE_TAG="$TAG" \
          TYPOLA_UPDATE_NOTES="Typola $VERSION" \
          TYPOLA_UPDATE_REPO="https://github.com/$REPO" \
          TYPOLA_MANIFEST_OUTPUT=latest.json \
          TYPOLA_GITEE_MANIFEST_OUTPUT=latest-gitee.json \
          TYPOLA_REQUIRE_PLATFORMS="darwin-aarch64,darwin-x86_64,windows-x86_64" \
          npm run updater:manifest

      - name: Upload latest.json and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" latest.json \
            --repo "${{ github.repository }}" --clobber
          gh release edit "${{ github.ref_name }}" \
            --draft=false --repo "${{ github.repository }}"

      - name: Sync to Gitee
        continue-on-error: true
        timeout-minutes: 20
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
        run: |
          if [ -z "${GITEE_TOKEN}" ] || [ -z "${GITEE_OWNER}" ]; then
            echo "Gitee secrets are not configured, skipping sync"
            exit 0
          fi

          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO="${GITEE_OWNER}/Typola"

          curl_gitee() {
            curl --silent --show-error --connect-timeout 20 --max-time 90 --retry 1 --retry-delay 2 "$@"
          }

          extract_release_id() {
            RELEASE_RESPONSE="$1" python3 - <<'PY'
          import json
          import os

          try:
              print(json.loads(os.environ.get("RELEASE_RESPONSE", "")).get("id", ""))
          except Exception:
              print("")
          PY
          }

          # Create Gitee release
          RELEASE_RESPONSE=$(curl_gitee -X POST \
            "https://gitee.com/api/v5/repos/${REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"Typola ${VERSION}\",
              \"body\": \"Typola ${VERSION} - 自动同步自 GitHub\",
              \"target_commitish\": \"main\",
              \"prerelease\": false
            }" || true)
          RELEASE_ID=$(extract_release_id "$RELEASE_RESPONSE")

          if [ -z "$RELEASE_ID" ]; then
            echo "Gitee release may already exist, trying to reuse ${TAG}"
            RELEASE_RESPONSE=$(curl_gitee \
              "https://gitee.com/api/v5/repos/${REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}" || true)
            RELEASE_ID=$(extract_release_id "$RELEASE_RESPONSE")
          fi

          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to create Gitee release, skipping sync"
            exit 0
          fi
          echo "Gitee release ID: ${RELEASE_ID}"

          # Download all assets from GitHub release (excluding latest.json)
          mkdir -p release-assets
          if ! timeout 300s gh release download "$TAG" --repo "${{ github.repository }}" --dir release-assets; then
            echo "Failed to download GitHub release assets, skipping Gitee sync"
            exit 0
          fi

          # Upload build artifacts to Gitee (skip latest.json, we'll generate a Gitee version)
          for FILE in release-assets/*; do
            FILENAME=$(basename "$FILE")
            if [ "$FILENAME" = "latest.json" ]; then continue; fi
            echo "Uploading ${FILENAME} to Gitee..."
            if ! curl_gitee --fail-with-body -X POST \
              "https://gitee.com/api/v5/repos/${REPO}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${FILE}" > /dev/null; then
              echo "Failed to upload ${FILENAME} to Gitee, continuing"
            fi
          done

          # Generate Gitee-specific latest.json with exact tag download URLs.
          TYPOLA_SIGNATURE_DIR=sigs \
          TYPOLA_UPDATE_VERSION="$VERSION" \
          TYPOLA_UPDATE_TAG="$TAG" \
          TYPOLA_UPDATE_NOTES="Typola $VERSION" \
          TYPOLA_UPDATE_GITEE_REPO="https://gitee.com/${REPO}" \
          TYPOLA_MANIFEST_OUTPUT=/tmp/latest-github.json \
          TYPOLA_GITEE_MANIFEST_OUTPUT=latest-gitee.json \
          TYPOLA_REQUIRE_PLATFORMS="darwin-aarch64,darwin-x86_64,windows-x86_64" \
          npm run updater:manifest

          # Upload Gitee latest.json (named latest.json on Gitee)
          if ! curl_gitee --fail-with-body -X POST \
            "https://gitee.com/api/v5/repos/${REPO}/releases/${RELEASE_ID}/attach_files" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@latest-gitee.json;filename=latest.json" > /dev/null; then
            echo "Failed to upload latest.json to Gitee, continuing"
          fi

          echo "Gitee release sync complete"
