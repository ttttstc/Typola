name: Bundle budget

on:
  pull_request:
    paths:
      - 'src/**'
      - 'config/vite.config.ts'
      - 'config/vite-plugin-perf-stub.ts'
      - 'package.json'
      - 'perf-budget.json'
      - 'scripts/perf/**'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/vite.config.ts'
      - 'config/vite-plugin-perf-stub.ts'
      - 'package.json'
      - 'perf-budget.json'
      - 'scripts/perf/**'

concurrency:
  group: perf-budget-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npm run build
      - run: npm run perf:bundle:check 2>&1 | tee budget-output.txt
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('budget-output.txt', 'utf-8');
            const header = '## Bundle budget check';
            const body = output.includes('FAIL')
              ? `❌ **Failed** — some chunks exceed the ledger\n\`\`\`\n${output}\n\`\`\``
              : `✅ **Passed** — all chunks within budget\n\`\`\`\n${output}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${header}\n\n${body}`,
            });