name: Package (manual dispatch)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 0.4.0'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: package-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Set version in manifests
        shell: pwsh
        run: |
          $v = "${{ inputs.version }}"
          $pj = Get-Content package.json -Raw | ConvertFrom-Json
          $pj.version = $v
          $pj | ConvertTo-Json -Depth 32 | Set-Content package.json -Encoding utf8NoBOM
          $tc = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tc.version = $v
          $tc | ConvertTo-Json -Depth 32 | Set-Content src-tauri/tauri.conf.json -Encoding utf8NoBOM

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri bundle (NSIS installer + updater artifacts)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build portable ZIP
        run: node scripts/build-portable.mjs

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Typola_${{ inputs.version }}_windows-x64_nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Typola_${{ inputs.version }}_windows-x64_portable
          path: src-tauri/target/release/bundle/portable/*.zip
          if-no-files-found: warn

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Typola_${{ inputs.version }}_windows-x64_update
          path: |
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.sig
          if-no-files-found: warn